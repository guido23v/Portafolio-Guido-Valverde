<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Personal - Guido Rea</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">

        <div class="profile-card">
            <div class="header">
                <div class="avatar">
                    <i class="fas fa-user-tie"></i>
                </div>

                <h1>Guido Fernando Rea Valverde</h1>
                <p>Militar en Servicio Pasivo</p>
            </div>

            <div class="info">
                <h2>Información Personal</h2>

                <div class="info-item">
                    <i class="fas fa-id-card"></i>
                    <span>C.I. 0502727423</span>
                </div>

                <div class="info-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span>03 de agosto de 1981</span>
                </div>

                <div class="info-item">
                    <i class="fas fa-user"></i>
                    <span>44 años</span>
                </div>

                <div class="info-item">
                    <i class="fas fa-briefcase"></i>
                    <span>Centro de Capacitación al Personal</span>
                </div>
            </div>
        </div>

        <div class="calculator-card">
            <h2>
                <i class="fas fa-calculator"></i>
                Calculadora Básica
            </h2>

            <input type="number" id="num1" placeholder="Ingrese el primer número">
            <input type="number" id="num2" placeholder="Ingrese el segundo número">

            <div class="buttons">
                <button onclick="sumar()">+</button>
                <button onclick="restar()">−</button>
                <button onclick="multiplicar()">×</button>
                <button onclick="dividir()">÷</button>
            </div>

            <div class="result-box">
                <h3>Resultado</h3>
                <p id="resultado">0</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
